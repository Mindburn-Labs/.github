    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  docs-truth:
    name: docs-truth
    uses: ./.github/workflows/docs-truth-public.yml
    secrets:
      MINDBURN_ORG_READ_TOKEN: ${{ secrets.MINDBURN_ORG_READ_TOKEN }}
