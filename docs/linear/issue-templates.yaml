version: 1
owner: "Platform DevOps & GitOps"
source_issue: "MIN-407"
apply_in: "Linear workspace issue templates"
templates:
  - name: "Radar Candidate"
    use_when: "A market, competitor, security, or ecosystem signal may become work."
    required_fields:
      - "Project"
      - "Target repos"
      - "Source truth"
      - "Impact / urgency"
      - "Acceptance criteria"
      - "Validation"
      - "Done gate"
    done_gate: "Signal is accepted, rejected, or converted into a linked implementation/research issue with evidence."

  - name: "Security Incident"
    use_when: "A vulnerability, secret, exposure, auth gap, or protected-boundary failure may affect users or production."
    required_fields:
      - "Project"
      - "Target repos"
      - "Source truth"
      - "Affected surfaces"
      - "Risk / severity"
      - "Containment"
      - "Acceptance criteria"
      - "Validation"
      - "Done gate"
    done_gate: "Fix is merged, verification evidence is linked, and any required rotation or disclosure action is recorded."

  - name: "Implementation Task"
    use_when: "Code, config, infrastructure, or automation must change."
    required_fields:
      - "Project"
      - "Target repos"
      - "Source truth"
      - "Acceptance criteria"
      - "Validation"
      - "Done gate"
    done_gate: "Change is merged through normal policy and required validation evidence is linked."

  - name: "Research Spike"
    use_when: "The right implementation is unknown and needs bounded investigation."
    required_fields:
      - "Project"
      - "Target repos"
      - "Source truth"
      - "Question"
      - "Decision needed"
      - "Evidence to collect"
      - "Done gate"
    done_gate: "Decision, evidence, and next issue or no-go reason are recorded."

  - name: "Docs Artifact"
    use_when: "A source-backed doc, runbook, report, onboarding page, or public claim needs work."
    required_fields:
      - "Project"
      - "Target repos"
      - "Source truth"
      - "Audience"
      - "Acceptance criteria"
      - "Validation"
      - "Done gate"
    done_gate: "Doc is merged in the owning repo and claims are backed by source or release evidence."

  - name: "Ops Incident"
    use_when: "A runtime, deploy, CI, access, billing, or service operation is degraded or blocked."
    required_fields:
      - "Project"
      - "Affected systems"
      - "Source truth"
      - "Impact"
      - "Current mitigation"
      - "Owner / escalation"
      - "Validation"
      - "Done gate"
    done_gate: "Service is restored or an accepted residual-risk/blocker note is linked."

  - name: "Customer Request"
    use_when: "Real external feedback from a buyer, partner, user, or evaluator needs tracking."
    required_fields:
      - "Project"
      - "Requester / account"
      - "Source truth"
      - "Request"
      - "Business impact"
      - "Acceptance criteria"
      - "Validation"
      - "Done gate"
    done_gate: "Request is shipped, rejected with rationale, or converted into linked roadmap work."

  - name: "Model Experiment"
    use_when: "Training, eval, serving, benchmark, or model-card work needs proof."
    required_fields:
      - "Project"
      - "Target repos"
      - "Source truth"
      - "Dataset / model"
      - "Metric"
      - "Baseline"
      - "Acceptance criteria"
      - "Validation"
      - "Done gate"
    done_gate: "Artifacts, metrics, and model-card or no-go evidence are linked; no production claim without promotion evidence."
